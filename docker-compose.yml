services:
  db:
    image: postgres:15-alpine
    container_name: neura_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neura_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: neura_api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/neura_db
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}
      NOTIFY_DIR: /app/notify
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      # Share the same notify folder with the vision container (and host)
      - ./notify:/app/notify
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  redis:
    image: redis:alpine
    container_name: neura_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  vision:
    build:
      context: .
      dockerfile: vision/Dockerfile
    container_name: neura_vision
    environment:
      VISION_RESIDENTS_DIR: /app/residents  
      NOTIFY_DIR: /app/notify
    ports:
      - "8001:8001"
    volumes:
      - ./residents:/app/residents
      - ./notify:/app/notify
volumes:
  postgres_data:
  redis_data:
