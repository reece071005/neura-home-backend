services:
  db:
    image: postgres:15-alpine
    container_name: neura_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neura_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: neura_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: neura_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/data

  influxdb:
    image: influxdb:2.7
    container_name: neura_influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminadminadmin
      DOCKER_INFLUXDB_INIT_ORG: neura
      DOCKER_INFLUXDB_INIT_BUCKET: smart_home
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: neura-super-token-change-later

  # =========================
  # MAIN API (8000)
  # =========================
  api:
    build: .
    container_name: neura_api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/neura_db
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}

      # InfluxDB (used for logging + history endpoints)
      INFLUX_SOURCE: local
      INFLUX_READONLY: "false"
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: neura-super-token-change-later
      INFLUX_ORG: neura
      INFLUX_BUCKET: smart_home

      # AI service internal URL (proxy uses this)
      AI_SERVICE_URL: http://ai_service:8002

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy
      influxdb:
        condition: service_started
      ai_service:
        condition: service_started

    volumes:
      - .:/app

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # =========================
  # AI SERVICE (8002)
  # =========================
  ai_service:
    build:
      context: ./ai_service
    container_name: neura_ai
    ports:
      - "8002:8002"

    environment:
      # AI needs Influx access
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: neura-super-token-change-later
      INFLUX_ORG: neura
      INFLUX_BUCKET: smart_home

      # AI needs Redis for cooldown/feedback
      REDIS_URL: redis://redis:6379/0

    depends_on:
      influxdb:
        condition: service_started
      redis:
        condition: service_started

    volumes:
      - ./ai_service:/app

    # IMPORTANT: must run ai_app.main, NOT app.main
    command: uvicorn ai_app.main:app --host 0.0.0.0 --port 8002 --reload

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  influxdb_data:
