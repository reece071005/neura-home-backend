services:
  db:
    image: postgres:15-alpine
    container_name: neura_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neura_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: neura_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: neura_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/data

  influxdb:
    image: influxdb:2.7
    container_name: neura_influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminadminadmin
      DOCKER_INFLUXDB_INIT_ORG: neura
      DOCKER_INFLUXDB_INIT_BUCKET: smart_home
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: neura-super-token-change-later

  api:
    build: .
    container_name: neura_api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/neura_db
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}

      # InfluxDB 2.x (API -> influxdb container)
      INFLUX_SOURCE: local
      INFLUX_READONLY: "false"
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: neura-super-token-change-later
      INFLUX_ORG: neura
      INFLUX_BUCKET: smart_home

    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      influxdb:
        condition: service_started
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  influxdb_data:
